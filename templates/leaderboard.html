{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h2>Leaderboard</h2>
    <table>
        <tr>
            <th>Rank</th>
            <th>Username</th>
            <th>Best Score</th>
            <th>Total</th>
        </tr>
        {% for r in results %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ r.username }}</td>
            <td>{{ r.best_score }}</td>
            <td>{{ r.total }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
